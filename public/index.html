<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>FinanceFlow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="setup-screen" class="setup-overlay">
    <div class="setup-card">
        <h2>Welcome to FinanceFlow</h2>
        <p>Lets set up starting balance</p>
        <input type="number" id="initial-balance" placeholder="Enter amount">
        <button id="start-setup">Start Tracking</button>
    </div>
</div>

<div class="app-container">
    <header>
        <h1 data-key="title">FinanceFlow</h1>
        <p class="subtitle" data-key="subtitle">Smart expense tracking</p>
    </header>

    <div class="balance-card">
        <p><span data-key="total">Total balance</span>: <span id="total-amount">0</span> UAH</p>
    </div>

    <div class="input-section">
        <input type="text" id="item-name" placeholder="Enter item name" data-key="input-name">
        <input type="number" id="item-price" placeholder="Enter item price" data-key="input-price">

        <select id="item-type">
            <option value="expense">Expenses</option>
            <option value="income">Incomes</option>
        </select>

        <button id="add-item" data-key="add-item">Add item</button>
    </div>

    <ul id="expense-list">

    </ul>
    <div class="footer-actions">
        <button id="clear-all" class="clear-all">Clear all</button>
    </div>
</div>
<script src="js/script.js"></script>

</body>
</html>
