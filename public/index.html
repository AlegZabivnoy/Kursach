<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>FinanceTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="setup-screen" class="setup-overlay">
    <div class="setup-card">
        <h2>Welcome to FinanceTrack</h2>
        <p>Lets set up starting balance</p>
        <input type="number" id="initial-balance" placeholder="Enter amount">
        <button id="start-setup">Start Tracking</button>
    </div>
</div>

<div class="app-container">
    <header>
        <h1 data-key="title">FinanceTrack</h1>
        <p class="subtitle" data-key="subtitle">Smart expense tracking</p>
    </header>

    <div class="balance-card">
        <p><span data-key="total">Total balance</span>: <span id="total-amount">0</span> UAH</p>
    </div>

    <div class="exchange-rates">
        <div class="rate-badge">
            USD: <span id="rate-usd">...</span> ₴
        </div>
        <div class="rate-badge">
            EUR: <span id="rate-eur">...</span> ₴
        </div>
    </div>

    <div class="input-section">
        <input type="text" id="item-name" placeholder="Enter item name" data-key="input-name">

        <div class="price-input-group">
            <input type="number" id="item-price" placeholder="Enter item price">
            <button id="open-calc-btn" type="button">Calc</button>
        </div>

        <select id="item-type">
            <option value="expense">Expenses</option>
            <option value="income">Incomes</option>
        </select>

        <button id="add-item" data-key="add-item">Add item</button>
    </div>

    <button id="toggle-history" class="history-tab">Hisotry</button>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="history-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Transactions</h2>
            <button id="close-sidebar" class="close-sidebar">&times;</button>
        </div>

        <div class="sort-section">
            <select id="sort-by">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="highest">Highest first</option>
                <option value="lowest">Lowest first</option>
            </select>
        </div>

        <ul id="expense-list"></ul>

        <div class="footer-actions">
            <div class="export-group">

                <select id="export-format">
                    <option value="csv">Excel(.csv)</option>
                    <option value="txt">Text(.txt)</option>
                </select>

                <button id="export-btn" type="button">Export</button>
                </div>

            <button id="clear-all" class="clear-all">Clear all</button>
        </div>
    </aside>
</div>

<dialog id="calc-dialog" class="calc-modal">
    <input type="text" id="calc-display" readonly>
    <div class="calc-grid">
        <button class="c-btn">7</button>
        <button class="c-btn">8</button>
        <button class="c-btn">9</button>
        <button class="c-btn">/</button>
        <button class="c-btn">4</button>
        <button class="c-btn">5</button>
        <button class="c-btn">6</button>
        <button class="c-btn">*</button>
        <button class="c-btn">1</button>
        <button class="c-btn">2</button>
        <button class="c-btn">3</button>
        <button class="c-btn">-</button>
        <button class="c-btn">C</button>
        <button class="c-btn">0</button>
        <button class="c-btn">=</button>
        <button class="c-btn">+</button>
    </div>
    <div class="calc-actions">
        <button id="calc-apply">Apply</button>
        <button id="calc-close">Close</button>
    </div>
</dialog>

<script type="module" src="js/app.js"></script>

</body>
</html>
